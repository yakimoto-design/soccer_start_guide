<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 650" role="img" aria-labelledby="title desc">
  <title id="title">サッカーを始める子どものヒーロー画像</title>
  <desc id="desc">青いユニフォームの子どもが芝生のサッカー場でボールへ走る、明るいLP向けビジュアル。</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eaf7ff"/>
      <stop offset=".42" stop-color="#f8fcff"/>
      <stop offset="1" stop-color="#d5ead5"/>
    </linearGradient>
    <linearGradient id="field" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#cce7bd"/>
      <stop offset=".55" stop-color="#9fce74"/>
      <stop offset="1" stop-color="#76ae4e"/>
    </linearGradient>
    <radialGradient id="sun" cx="72%" cy="22%" r="28%">
      <stop offset="0" stop-color="#fff" stop-opacity=".9"/>
      <stop offset=".42" stop-color="#fff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#1a3e22" flood-opacity=".24"/>
    </filter>
  </defs>
  <rect width="1400" height="650" fill="url(#sky)"/>
  <rect y="330" width="1400" height="320" fill="url(#field)"/>
  <rect x="0" y="330" width="1400" height="320" fill="url(#sun)"/>
  <g opacity=".42">
    <rect x="585" y="0" width="88" height="650" fill="#b5d9d6"/>
    <rect x="760" y="0" width="88" height="650" fill="#b5d9d6"/>
    <rect x="940" y="0" width="88" height="650" fill="#b5d9d6"/>
    <rect x="1120" y="0" width="88" height="650" fill="#b5d9d6"/>
    <rect x="1300" y="0" width="88" height="650" fill="#b5d9d6"/>
  </g>
  <g filter="url(#soft)" opacity=".4">
    <ellipse cx="1020" cy="274" rx="170" ry="42" fill="#5f934c"/>
    <ellipse cx="1220" cy="286" rx="210" ry="46" fill="#5d964a"/>
    <ellipse cx="820" cy="292" rx="190" ry="36" fill="#6ca65a"/>
